<!-- Sección principal con fondo degradado verde y centrado del contenido -->
<section class="min-h-screen flex items-center justify-center px-4 py-8 bg-gradient-to-br from-green-50 via-green-100 to-green-200 font-sans">
  <!-- Contenedor de la tarjeta del formulario -->
  <div class="w-full max-w-md bg-white rounded-xl shadow-2xl p-8 transform transition-all duration-300 hover:scale-105">

    <!-- Encabezado del formulario -->
    <div class="text-center mb-8">
      <h3 class="text-3xl font-extrabold text-green-800">Iniciar Sesión</h3>
      <p class="text-gray-600 text-sm mt-3">
        ¿No tienes una cuenta?
        <a href="/register" class="text-green-600 hover:underline font-semibold transition duration-200">Regístrate</a>
      </p>
    </div>

    <!-- Formulario de login -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Campo Correo electrónico -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Correo electrónico
        </label>
        <input
          class="w-full text-base px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
          type="email"
          placeholder="nombre@empresa.com"
          formControlName="email"
          id="email"
        />
        <p *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
           class="text-red-600 text-xs mt-1">
          <span *ngIf="form.get('email')?.errors?.['required']">El correo es obligatorio.</span>
          <span *ngIf="form.get('email')?.errors?.['email']">Introduce un correo válido.</span>
        </p>
      </div>

      <!-- Campo Contraseña -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
          Contraseña
        </label>
        <input
          class="w-full text-base px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition duration-200"
          type="password"
          placeholder="••••••••"
          formControlName="password"
          id="password"
        />
        <p *ngIf="form.get('password')?.invalid && form.get('password')?.touched"
           class="text-red-600 text-xs mt-1">
          <span *ngIf="form.get('password')?.errors?.['required']">La contraseña es obligatoria.</span>
        </p>
      </div>

      <!-- Enlace ¿Olvidaste tu contraseña? -->
      <div class="text-right text-sm mt-2">
        <a href="/forgot-password" class="text-green-600 hover:underline transition duration-200">¿Olvidaste tu contraseña?</a>
      </div>

    

      <!-- Botón de Iniciar sesión -->
      <button
        type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-300 transform hover:scale-105"
        [disabled]="form.invalid"
      >
        Iniciar Sesión
      </button>
    </form>

    <!-- Separador -->
    <div class="flex items-center gap-2 text-gray-500 text-sm my-6">
      <hr class="flex-grow border-gray-300">
      <span>o continúa con</span>
      <hr class="flex-grow border-gray-300">
    </div>

    <!-- Botones de login social -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Botón Google -->
      <button type="button" (click)="onClickGoogle()"
        class="flex items-center justify-center gap-3 border border-gray-300 py-3 rounded-lg shadow-sm hover:bg-gray-50 transition duration-200 transform hover:scale-105">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.000 4.000c-2.420 0-4.660 0.880-6.380 2.420l-1.040 1.040 2.500 2.500 1.040-1.040c1.160-1.000 2.700-1.540 4.280-1.540 3.520 0 6.160 2.640 6.160 6.160 0 3.520-2.640 6.160-6.160 6.160-1.340 0-2.580-0.420-3.600-1.120l-0.540-0.340-2.640 0.820 0.340 0.520c1.220 0.820 2.620 1.280 4.140 1.280 4.780 0 8.700-3.920 8.700-8.700 0-4.780-3.920-8.700-8.700-8.700zM12.000 8.000c2.200 0 4.000 1.800 4.000 4.000 0 2.200-1.800 4.000-4.000 4.000-2.200 0-4.000-1.800-4.000-4.000 0-2.200 1.800-4.000 4.000-4.000z" fill="#4285F4"/>
          <path d="M20.612 12c0 0.94-0.122 1.83-0.345 2.68l-2.073-1.603c0.117-0.314 0.177-0.655 0.177-1.077 0-1.92-1.258-3.415-3.033-3.415s-3.033 1.495-3.033 3.415c0 1.92 1.258 3.415 3.033 3.415c0.887 0 1.696-0.347 2.298-0.916l2.073 1.603c-0.906 1.15-2.277 1.88-3.901 1.88-3.52 0-6.4-2.88-6.4-6.4s2.88-6.4 6.4-6.4c3.52 0 6.4 2.88 6.4 6.4z" fill="#FBBC05"/>
          <path d="M12 21.999c-1.63 0-3.23-0.58-4.52-1.64L5.41 19.34C6.54 20.35 8.16 20.9 9.87 20.9c2.32 0 4.22-0.89 5.75-2.35l-2.07-1.6c-1.04 0.81-2.28 1.26-3.6 1.26z" fill="#34A853"/>
          <path d="M4.000 12.000c0-0.62 0.1-1.21 0.28-1.78l-2.12-1.64C1.52 9.07 1.0 10.46 1.0 12.0c0 1.54 0.52 2.93 1.48 4.01l2.12-1.64C4.1 13.21 4.0 12.62 4.0 12.0z" fill="#EA4335"/>
        </svg>
        <span class="text-sm font-semibold text-gray-700">Google</span>
      </button>

      <!-- Botón GitHub -->
      <button type="button" (click)="onClicklogInGitHub()"
        class="flex items-center justify-center gap-3 border border-gray-300 py-3 rounded-lg shadow-sm hover:bg-gray-50 transition duration-200 transform hover:scale-105">
        <svg class="w-6 h-6 text-gray-800" fill="currentColor" viewBox="0 0 24 24">
          <path fill-rule="evenodd" d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577 0-.285-.01-1.04-.017-2.04-3.338.724-4.042-1.61-4.042-1.619-.546-1.38-1.334-1.756-1.334-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.838 1.237 1.838 1.237 1.07 1.835 2.809 1.305 3.493.998.108-.776.418-1.305.762-1.605-2.665-.304-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.118-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.015 2.892-.015 3.286 0 .315.192.694.801.576C20.562 22.189 24 17.682 24 12 24 5.373 18.627 0 12 0z" clip-rule="evenodd"/>
        </svg>
        <span class="text-sm font-semibold text-gray-700">GitHub</span>
      </button>

      <!-- Botón Facebook -->
      <button type="button" (click)="onClickFacebook()"
        class="flex items-center justify-center gap-3 border border-gray-300 py-3 rounded-lg shadow-sm hover:bg-gray-50 transition duration-200 transform hover:scale-105">
        <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
          <path d="M22.675 0H1.325C0.593 0 0 0.593 0 1.325v21.351C0 23.407 0.593 24 1.325 24h11.399V14.65h-3.61v-4.21h3.61V7.559c0-3.582 2.193-5.541 5.385-5.541 1.548 0 2.871 0.115 3.259 0.167v3.743h-2.211c-1.748 0-2.091 0.832-2.091 2.052v2.704h4.153l-0.542 4.21h-3.611V24h6.082C23.407 24 24 23.407 24 22.675V1.325C24 0.593 23.407 0 22.675 0z"/>
        </svg>
        <span class="text-sm font-semibold text-gray-700">Facebook</span>
      </button>
    </div>
  </div>
</section>
