<div class="container">
    <div class="toggle-buttons">
        <button class="btn btn-primary" (click)="mostrarLogin()">Login</button>
        <button class="btn btn-secondary" (click)="mostrarRegistro()">Sign In</button>
    </div>

    <!-- Formulario de Login -->
    <div class="login-container" *ngIf="mostrarFormulario === 'login'">
        <h2>Iniciar Sesión</h2>
        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Correo Electrónico" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-custom w-100">Ingresar</button>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

    <!-- Formulario de Registro -->
    <div class="login-container" *ngIf="mostrarFormulario === 'registro'">
        <h2>Registro</h2>
        <form>
            <div class="mb-3">
                <input type="text" class="form-control" placeholder="Nombre Completo" required>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Correo Electrónico" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Confirmar Contraseña" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Registrarse</button>
        </form>
    </div>
</div>
