<div class="fixed inset-0 bg-gradient-to-br from-gray-900 via-purple-900 to-purple-800 z-0"></div>
<div class="max-w-2xl mx-auto mt-12 p-6 bg-green-50 rounded-2xl shadow-lg border border-green-200">
  <h2 class="text-2xl font-bold text-green-700 mb-6 text-center">
    {{ editando ? 'Editar Usuario' : 'Registrar Usuario' }}
  </h2>

  <form [formGroup]="usuarioForm" (ngSubmit)="guardarUsuario()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-green-900">Nombre</label>
      <input
        formControlName="nombre"
        type="text"
        class="w-full px-4 py-2 border border-green-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-green-900">Correo</label>
      <input
        formControlName="email"
        type="email"
        class="w-full px-4 py-2 border border-green-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-green-900">Contraseña</label>
      <input
        formControlName="password"
        type="password"
        class="w-full px-4 py-2 border border-green-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
      />
    </div>

    <div class="flex justify-between">
      <button
        type="submit"
        class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition"
      >
        {{ editando ? 'Actualizar' : 'Agregar' }}
      </button>
      <button
        *ngIf="editando"
        type="button"
        (click)="cancelarEdicion()"
        class="px-5 py-2 bg-gray-500 hover:bg-gray-600 text-white font-semibold rounded-lg transition"
      >
        Cancelar
      </button>
    </div>
  </form>

  <hr class="my-8 border-green-300" />

  <h3 class="text-xl font-bold text-green-700 mb-4">Usuarios Registrados</h3>
  <ul class="divide-y divide-green-200">
    <li
      *ngFor="let usuario of usuarios"
      class="flex justify-between items-center py-3 px-2 hover:bg-green-100 rounded-lg transition"
    >
      <span class="text-green-900">{{ usuario.nombre }} - {{ usuario.email }}</span>
      <div class="space-x-2">
        <button
          (click)="editarUsuario(usuario)"
          class="px-3 py-1 bg-yellow-400 text-white rounded hover:bg-yellow-500 transition"
        >
          Editar
        </button>
        <button
          (click)="eliminarUsuario(usuario.id!)"
          class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 transition"
        >
          Eliminar
        </button>
      </div>
    </li>
  </ul>
</div>
